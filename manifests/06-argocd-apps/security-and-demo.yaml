apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rizjiy/istio-service-mesh.git
    targetRevision: main
    path: manifests/03-demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-mtls
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rizjiy/istio-service-mesh.git
    targetRevision: main
    path: manifests/05-security-mtls
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true