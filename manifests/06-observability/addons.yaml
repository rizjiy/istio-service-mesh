apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-addons
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/istio/istio.git
    targetRevision: release-1.24
    path: samples/addons
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true