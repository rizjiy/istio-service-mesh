apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingressgateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rizjiy/istio-service-mesh.git
    targetRevision: main
    path: manifests/02-istio-install
    directory:
      include: "gateway-rendered.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
